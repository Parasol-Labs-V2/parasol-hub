<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parasol Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#f90006;
  --yellow:#fad000;
  --black:#000000;
  --cream:#fff1e3;
  --tan:#edd6bd;
  --blue:#008ceb;
}
html,body{width:100%;height:100%;font-family:'Inter',sans-serif;background:var(--cream);color:var(--black);overflow:hidden}
#homepage{width:100%;height:100vh;display:flex;flex-direction:column;opacity:0;animation:fadeIn 0.8s ease 0.1s forwards;overflow-y:auto}
@keyframes fadeIn{to{opacity:1}}

/* Header */
.hub-header{background:var(--black);padding:0 44px;height:64px;display:flex;align-items:center;gap:24px;border-bottom:4px solid var(--red)}
.header-brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.logo-mark{width:44px;height:44px;position:relative;flex-shrink:0}
.logo-arc{position:absolute;bottom:0;left:0;width:44px;height:44px;border-radius:50% 50% 0 0 / 50% 50% 0 0;background:var(--red)}
.logo-sun{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:22px;height:11px;border-radius:11px 11px 0 0;background:var(--yellow)}
.brand-text{font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;color:white}
.brand-text .r{color:var(--red)}
.brand-text .y{color:var(--yellow)}
.header-right{display:flex;align-items:center;gap:12px}
#last-updated{font-size:12px;color:rgba(255,255,255,0.5)}
.refresh-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:6px 14px;border-radius:6px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s}
.refresh-btn:hover{border-color:var(--red);color:white}

/* Hero */
.hero{text-align:center;padding:56px 20px 40px;flex-shrink:0;background:var(--cream)}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:12px}
.hero-tagline{font-size:clamp(32px,5vw,56px);font-weight:800;letter-spacing:-1.5px;line-height:1.05;color:var(--black);opacity:0;transform:translateY(20px);animation:slideUp 0.7s ease 0.3s forwards}
.hero-tagline .accent{color:var(--red)}
.hero-sub{margin-top:12px;font-size:16px;color:#555;opacity:0;animation:slideUp 0.65s ease 0.5s forwards}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}

/* Yellow accent bar */
.accent-bar{height:4px;background:linear-gradient(90deg,var(--red) 0%,var(--yellow) 50%,var(--red) 100%);flex-shrink:0}

/* Client tiles */
.client-tiles{display:flex;gap:24px;justify-content:center;align-items:flex-start;padding:40px 44px 48px;flex:1;flex-wrap:wrap;background:var(--cream)}
.client-card{background:white;border:2px solid #e8e0d8;border-radius:16px;padding:28px;width:360px;cursor:pointer;transition:transform 0.25s ease,border-color 0.25s ease,box-shadow 0.25s ease;opacity:0;transform:translateY(28px);position:relative;overflow:hidden}
.client-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--red)}
.client-card.c1{animation:cardIn 0.6s ease 0.6s forwards}
.client-card.c2{animation:cardIn 0.6s ease 0.75s forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.client-card:hover{transform:translateY(-6px);border-color:var(--red);box-shadow:0 12px 40px rgba(249,0,6,0.12)}
.client-card:hover::before{background:linear-gradient(90deg,var(--red),var(--yellow))}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-name{font-size:20px;font-weight:800;color:var(--black)}
.crm-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;background:var(--cream);border:1px solid #e8e0d8;color:#666;letter-spacing:0.3px}

.health-signal{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:10px 14px;background:var(--cream);border-radius:8px;border:1px solid #e8e0d8}
.health-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.health-dot.green{background:#16a34a;box-shadow:0 0 8px rgba(22,163,74,0.5);animation:blink 2s ease-in-out infinite}
.health-dot.yellow{background:#d97706;box-shadow:0 0 8px rgba(217,119,6,0.5);animation:blink 2.5s ease-in-out infinite}
.health-dot.red-h{background:var(--red);box-shadow:0 0 8px rgba(249,0,6,0.4);animation:blink 1.5s ease-in-out infinite}
.health-dot.idle{background:#ccc}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.health-text{font-size:13px;color:#555;font-weight:500}

.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.metric{background:var(--cream);border:1px solid #e8e0d8;border-radius:8px;padding:12px 14px}
.metric-label{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.metric-value{font-size:20px;font-weight:800;color:var(--black);transition:color 0.3s}
.metric-value.dim{color:#ccc;font-size:16px;font-weight:400}

.view-btn{width:100%;padding:13px;background:var(--red);border:none;border-radius:8px;color:white;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.2s,transform 0.15s,box-shadow 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.3px}
.view-btn:hover{background:#d10005;box-shadow:0 4px 20px rgba(249,0,6,0.3);transform:translateY(-1px)}
.view-btn:active{transform:translateY(0)}

/* Footer */
.hub-footer{text-align:center;padding:16px;font-size:12px;color:#aaa;background:var(--cream);flex-shrink:0}
.hub-footer span{color:var(--red);font-weight:600}

/* Client view */
#client-view{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;background:var(--cream);opacity:0;pointer-events:none;transition:opacity 0.35s ease}
#client-view.open{opacity:1;pointer-events:all}
.client-nav{height:52px;flex-shrink:0;background:var(--black);border-bottom:3px solid var(--red);display:flex;align-items:center;padding:0 20px;gap:16px}
.back-btn{background:none;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:5px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;font-family:'Inter',sans-serif}
.back-btn:hover{color:white;border-color:var(--red)}
.client-nav-name{font-size:14px;font-weight:700;color:white}
.client-nav-badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--red);color:white;font-weight:600}
.client-nav-time{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.4)}
.client-iframe{flex:1;border:none;width:100%}

@media(max-width:800px){
  .hub-header{padding:0 20px}
  .client-tiles{padding:24px 20px 40px;gap:16px}
  .client-card{width:100%;max-width:460px}
  .hero{padding:36px 20px 28px}
}
</style>
</head>
<body>
<div id="homepage">
  <header class="hub-header">
    <div class="header-brand">
      <img src="https://images.squarespace-cdn.com/content/v1/6684045ac016b60bf3df5cfe/1585dbb8-82f5-4563-bd4d-4e22add5bd37/Parasol-Logo-Horizontal-Color.png?format=300w" style="height:36px;object-fit:contain" alt="Parasol">
      <div class="brand-text" style="font-size:1.2rem"> hub</div>
    </div>
    <div class="header-right">
      <span id="last-updated"></span>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>
  </header>
  <div class="accent-bar"></div>
  <div class="hero">
    <div class="hero-eyebrow">Client Dashboard Portal</div>
    <div class="hero-tagline">Your Clients. <span class="accent">One View.</span></div>
    <div class="hero-sub">Select a client to view their full dashboard</div>
  </div>
  <div class="client-tiles">
    <div class="client-card c1" onclick="openClient('messagedesk')">
      <div class="card-top">
        <div class="card-name">MessageDesk</div>
        <div class="crm-badge">Close.io</div>
      </div>
      <div class="health-signal">
        <div class="health-dot idle" id="md-dot"></div>
        <div class="health-text" id="md-health-text">Loading…</div>
      </div>
      <div class="metrics-grid">
        <div class="metric"><div class="metric-label">Pipeline MRR</div><div class="metric-value dim" id="md-pipeline-mrr">—</div></div>
        <div class="metric"><div class="metric-label">Active Deals</div><div class="metric-value dim" id="md-active-deals">—</div></div>
        <div class="metric"><div class="metric-label">Won MRR</div><div class="metric-value dim" id="md-won-mrr">—</div></div>
        <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value dim" id="md-win-rate">—</div></div>
      </div>
      <button class="view-btn">View Dashboard →</button>
    </div>
    <div class="client-card c2" onclick="openClient('duet')">
      <div class="card-top">
        <div class="card-name">Duet</div>
        <div class="crm-badge">HubSpot</div>
      </div>
      <div class="health-signal">
        <div class="health-dot idle" id="duet-dot"></div>
        <div class="health-text" id="duet-health-text">Loading…</div>
      </div>
      <div class="metrics-grid">
        <div class="metric"><div class="metric-label">Active Lives</div><div class="metric-value dim" id="duet-active-lives">—</div></div>
        <div class="metric"><div class="metric-label">Active Deals</div><div class="metric-value dim" id="duet-active-deals">—</div></div>
        <div class="metric"><div class="metric-label">Outreach Gap</div><div class="metric-value dim" id="duet-outreach-gap">—</div></div>
        <div class="metric"><div class="metric-label">Gross Savings</div><div class="metric-value dim" id="duet-gross-savings">—</div></div>
      </div>
      <button class="view-btn">View Dashboard →</button>
    </div>
  </div>
  <div class="hub-footer">Built by <span>Parasol</span></div>
</div>

<div id="client-view">
  <nav class="client-nav">
    <button class="back-btn" onclick="closeClient()">← Back</button>
    <div class="client-nav-name" id="client-nav-name"></div>
    <div class="client-nav-badge" id="client-nav-badge"></div>
    <div class="client-nav-time" id="client-nav-time"></div>
  </nav>
  <iframe class="client-iframe" id="client-iframe" src="" title="Client Dashboard"></iframe>
</div>

<script>
function fmt$(n){if(!n&&n!==0)return '$0';if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return '$'+(n/1e3).toFixed(1)+'K';return '$'+Math.round(n).toLocaleString()}
function fmtNum(n){if(!n&&n!==0)return '0';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(1)+'K';return Math.round(n).toLocaleString()}
function setMetric(id,val){const el=document.getElementById(id);if(!el)return;el.textContent=val;el.classList.remove('dim')}
function setHealth(prefix,cls,text){const dot=document.getElementById(prefix+'-dot');const txt=document.getElementById(prefix+'-health-text');if(dot)dot.className='health-dot '+cls;if(txt)txt.textContent=text}
function setTimestamp(iso){if(!iso)return;const s='Updated '+new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});document.getElementById('last-updated').textContent=s;document.getElementById('client-nav-time').textContent=s}
const ACTIVE_STAGES=new Set(['New / Not Yet Contacted','Attempting Contact','Parasol Engaged','Meeting Booked','Meeting Held','Interest Confirmed','Diagnostic','LOI Sent']);
async function loadMD(){
  try{
    const res=await fetch('/api/messagedesk/dashboard');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();const k=data.kpis||{};
    const active=k.active_count||k.active_opportunities||0;
    const pipeline=k.active_mrr||k.pipeline_mrr||0;
    const won=k.won_mrr||0;
    const total=( k.won_count||0)+(k.lost_count||0);
    const wr=total>0?Math.round((k.won_count||0)/total*100):k.win_rate||0;
    setMetric('md-pipeline-mrr',fmt$(pipeline));
    setMetric('md-active-deals',active);
    setMetric('md-won-mrr',fmt$(won));
    setMetric('md-win-rate',wr+'%');
    const cls=wr>30?'green':wr>=15?'yellow':'red-h';
    const lbl=wr>30?'Pipeline healthy':wr>=15?'Moderate pipeline':'Pipeline at risk';
    setHealth('md',cls,lbl);setTimestamp(data.updated_at||new Date().toISOString());
  }catch(e){setHealth('md','red-h','Failed to load');['md-pipeline-mrr','md-active-deals','md-won-mrr','md-win-rate'].forEach(id=>setMetric(id,'Error'))}
}
async function loadDuet(){
  try{
    const res=await fetch('/api/duet/deals');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();const deals=data.deals||[];
    const active=deals.filter(d=>ACTIVE_STAGES.has(d.stage));
    const lives=active.reduce((s,d)=>s+(d.lives||0),0);
    const gap=deals.filter(d=>d.outreach_attempts===0&&d.stage!=='Enrolled / Won').length;
    const savings=active.reduce((s,d)=>s+Math.max(0,d.gross_savings||0),0);
    setMetric('duet-active-lives',fmtNum(lives));
    setMetric('duet-active-deals',active.length);
    setMetric('duet-outreach-gap',gap);
    setMetric('duet-gross-savings',fmt$(savings));
    const cls=lives>20000?'green':lives>=10000?'yellow':'red-h';
    const lbl=lives>20000?'Strong pipeline':lives>=10000?'Moderate pipeline':'Needs attention';
    setHealth('duet',cls,lbl);setTimestamp(data.updated_at);
  }catch(e){setHealth('duet','red-h','Failed to load');['duet-active-lives','duet-active-deals','duet-outreach-gap','duet-gross-savings'].forEach(id=>setMetric(id,'Error'))}
}
const URLS={messagedesk:'https://messagedesk-dashboard.vercel.app/',duet:'https://duet-dashboard.vercel.app/'};
const NAMES={messagedesk:'MessageDesk',duet:'Duet'};
const BADGES={messagedesk:'Close.io',duet:'HubSpot'};
function openClient(client){
  document.getElementById('client-nav-name').textContent=NAMES[client];
  document.getElementById('client-nav-badge').textContent=BADGES[client];
  document.getElementById('client-iframe').src=URLS[client];
  document.getElementById('client-view').classList.add('open');
}
function closeClient(){
  const v=document.getElementById('client-view');
  v.classList.remove('open');
  setTimeout(()=>{document.getElementById('client-iframe').src=''},400);
}
document.getElementById('refresh-btn').addEventListener('click',()=>{
  ['md-pipeline-mrr','md-active-deals','md-won-mrr','md-win-rate','duet-active-lives','duet-active-deals','duet-outreach-gap','duet-gross-savings'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent='—';el.classList.add('dim')}});
  setHealth('md','idle','Loading…');setHealth('duet','idle','Loading…');
  loadMD();loadDuet();
});
loadMD();loadDuet();
</script>
</body>
</html>
