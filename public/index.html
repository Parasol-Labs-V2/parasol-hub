<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MessageDesk Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── Variables ─────────────────────────────────────────────────────────────── */
:root {
  --red:          #E8231A;
  --yellow:       #F5C800;
  --blue:         #1B9BF0;
  --black:        #111111;
  --cream:        #FAF5EE;
  --gray:         #6B7280;
  --green:        #16A34A;
  --green-bg:     #DCFCE7;
  --gray-light:   #F3F4F6;
  --gray-border:  #E5E7EB;
  --teal:         #00695C;
  --teal-bg:      #E0F2F1;
  --radius:       12px;
  --shadow:       0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
}

/* ─── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--black);
  line-height: 1.5;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; }
table  { border-collapse: collapse; width: 100%; }

/* ─── Layout helpers ─────────────────────────────────────────────────────────── */
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* ─── Header ─────────────────────────────────────────────────────────────────── */
.site-header {
  background: var(--black);
  border-bottom: 3px solid var(--red);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  display: flex; align-items: center; gap: 14px;
  height: 60px; max-width: 1400px; margin: 0 auto; padding: 0 24px;
}
.parasol-logo {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  background: conic-gradient(var(--red) 0deg 120deg, var(--yellow) 120deg 240deg, var(--blue) 240deg 360deg);
}
.header-titles { flex: 1; min-width: 0; }
.header-titles h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
.header-titles .subtitle { font-size: 11px; color: #9CA3AF; margin-top: 1px; }
.header-pills { display: flex; gap: 8px; }
.pill {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  color: #fff; border-radius: 20px; padding: 3px 11px;
  font-size: 12px; font-weight: 500; white-space: nowrap;
}
.pill b { font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 10px; margin-left: 8px; flex-shrink: 0; }
.updated-time { font-size: 11px; color: #9CA3AF; white-space: nowrap; }
.refresh-btn {
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  padding: 5px 13px; border-radius: 6px; font-size: 12px; font-weight: 600;
  transition: background .15s;
}
.refresh-btn:hover { background: rgba(255,255,255,.22); }
.refresh-btn:disabled { opacity: .5; cursor: default; }

/* ─── Tab Navigation ─────────────────────────────────────────────────────────── */
.tabs-bar {
  background: #fff; border-bottom: 1px solid var(--gray-border);
  position: sticky; top: 63px; z-index: 90;
}
.tabs-inner {
  display: flex; max-width: 1400px; margin: 0 auto; padding: 0 24px;
  overflow-x: auto; scrollbar-width: none;
}
.tabs-inner::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 14px 18px; font-size: 13px; font-weight: 500; color: var(--gray);
  background: none; border: none; border-bottom: 2px solid transparent;
  white-space: nowrap; cursor: pointer; transition: color .15s, border-color .15s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--black); }
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

/* ─── Tab Panels ─────────────────────────────────────────────────────────────── */
.tab-panel { display: none; padding: 20px 24px 48px; max-width: 1400px; margin: 0 auto; }
.tab-panel.active { display: block; }

/* ─── Alert Bar ──────────────────────────────────────────────────────────────── */
.alert-bar {
  background: var(--black); color: #fff; border-radius: 10px;
  padding: 13px 18px; display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 500; margin-bottom: 20px; line-height: 1.5;
}
.blink-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--red);
  flex-shrink: 0; animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.alert-bar strong { color: var(--yellow); }

/* ─── KPI Cards ──────────────────────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.kpi-grid.cols3 { grid-template-columns: repeat(3,1fr); }
.kpi-card {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  border: 1px solid var(--gray-border); border-top: 3px solid var(--gray-border);
  padding: 18px 20px;
}
.kpi-card.red    { border-top-color: var(--red); }
.kpi-card.blue   { border-top-color: var(--blue); }
.kpi-card.yellow { border-top-color: var(--yellow); }
.kpi-card.black  { border-top-color: var(--black); }
.kpi-card.green  { border-top-color: var(--green); }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 800; line-height: 1.1; letter-spacing: -1px; }
.kpi-sub   { font-size: 12px; color: var(--gray); margin-top: 5px; }
.kpi-prev  { font-size: 11px; color: var(--gray); margin-top: 4px; }
.kpi-tag   { display: inline-block; margin-top: 9px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.kpi-tag.red    { background: #FEE2E2; color: #991B1B; }
.kpi-tag.yellow { background: #FEF9C3; color: #854D0E; }
.kpi-tag.blue   { background: #DBEAFE; color: #1D4ED8; }
.kpi-tag.green  { background: var(--green-bg); color: #166534; }
.kpi-tag.black  { background: #F3F4F6; color: #374151; }

/* ─── Delta Badges ───────────────────────────────────────────────────────────── */
.delta { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.delta.pos { background: var(--green-bg); color: #166534; }
.delta.neg { background: #FEE2E2; color: #991B1B; }
.delta.neu { background: var(--gray-light); color: var(--gray); }

/* ─── Metric Cards ───────────────────────────────────────────────────────────── */
.metric-card {
  background: var(--black); color: #fff; border-radius: var(--radius);
  padding: 22px 20px; text-align: center; box-shadow: var(--shadow);
}
.metric-pct   { font-size: 38px; font-weight: 800; color: var(--yellow); line-height: 1; }
.metric-label { font-size: 12px; color: #9CA3AF; margin-top: 6px; }
.metric-sub   { font-size: 11px; color: #6B7280; margin-top: 2px; }

/* ─── Chart Cards ────────────────────────────────────────────────────────────── */
.chart-card {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  border: 1px solid var(--gray-border); padding: 20px;
}
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; }
.chart-canvas { width: 100%; display: block; }
.donut-wrap   { display: flex; align-items: center; gap: 24px; }
.donut-legend { display: flex; flex-direction: column; gap: 9px; min-width: 170px; }
.legend-item  { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-lbl   { flex: 1; color: var(--gray); }
.legend-val   { font-weight: 700; font-size: 12px; }

/* ─── Horizontal Bar (CSS-drawn, no canvas) ──────────────────────────────────── */
.hbar-row { margin-bottom: 12px; }
.hbar-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.hbar-meta .hbar-lbl { font-weight: 500; }
.hbar-meta .hbar-cnt { color: var(--gray); font-weight: 600; }
.hbar-track { height: 8px; background: var(--gray-light); border-radius: 4px; overflow: hidden; }
.hbar-fill  { height: 100%; border-radius: 4px; transition: width .5s ease; }

/* ─── Deal Tables ────────────────────────────────────────────────────────────── */
.section-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 8px; background: #fff;
  border-bottom: 1px solid var(--gray-border);
}
.section-title { font-size: 13px; font-weight: 700; }
.section-badge {
  padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: var(--gray-light); color: var(--gray);
}
.table-wrap {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  border: 1px solid var(--gray-border); overflow: hidden; margin-bottom: 20px;
}
.tscroll { overflow-y: auto; max-height: 360px; }
.tscroll::-webkit-scrollbar { width: 4px; }
.tscroll::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 2px; }
thead th {
  padding: 9px 12px; background: var(--gray-light);
  font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .5px;
  text-align: left; white-space: nowrap; border-bottom: 1px solid var(--gray-border);
  position: sticky; top: 0; z-index: 1;
}
tbody tr { border-bottom: 1px solid var(--gray-border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #FAFAFA; }
tbody td { padding: 10px 12px; font-size: 13px; vertical-align: middle; }
.col-company { font-weight: 600; max-width: 200px; }
.mono { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; font-weight: 600; }

/* ─── Score Badges ───────────────────────────────────────────────────────────── */
.score {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.score.sc-green  { background: var(--green-bg); color: #166534; }
.score.sc-yellow { background: #FEF9C3; color: #854D0E; }
.score.sc-red    { background: #FEE2E2; color: #991B1B; }

/* ─── Age Badges ─────────────────────────────────────────────────────────────── */
.age { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.age.ag-green  { background: var(--green-bg); color: #166534; }
.age.ag-yellow { background: #FEF9C3; color: #854D0E; }
.age.ag-red    { background: #FEE2E2; color: #991B1B; }

/* ─── Stage Badges ───────────────────────────────────────────────────────────── */
.sb { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.sb-active     { background: var(--teal-bg); color: var(--teal); }
.sb-onboarding { background: #DBEAFE; color: #1D4ED8; }
.sb-won        { background: var(--green-bg); color: #166534; }
.sb-lost       { background: #FEE2E2; color: #991B1B; }
.sb-champion   { background: #FEF9C3; color: #854D0E; }

/* ─── Pipeline Review Cards ──────────────────────────────────────────────────── */
.pr-card {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  border: 1px solid var(--gray-border); overflow: hidden; margin-bottom: 14px;
}
.pr-head {
  background: var(--gray-light); padding: 14px 18px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.pr-company  { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
.pr-val      { font-size: 17px; font-weight: 800; color: var(--red); font-family: 'SF Mono','Fira Code',monospace; white-space: nowrap; }
.pr-body     { padding: 14px 18px; }
.pr-nxt-lbl  { font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.pr-nxt-text { font-size: 13px; line-height: 1.65; }
.pr-empty    { font-size: 13px; color: #9CA3AF; font-style: italic; }

/* ─── Meetings ───────────────────────────────────────────────────────────────── */
.day-group { margin-bottom: 24px; }
.day-label {
  font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase;
  letter-spacing: .8px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-border); margin-bottom: 10px;
}
.meeting-card {
  background: #fff; border-radius: 10px; border: 1px solid var(--gray-border);
  padding: 13px 16px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow); margin-bottom: 8px;
}
.mtg-date-box {
  background: var(--black); color: #fff; border-radius: 8px;
  width: 44px; height: 44px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  line-height: 1.1;
}
.mtg-day { font-size: 19px; font-weight: 800; }
.mtg-mon { font-size: 9px; text-transform: uppercase; color: #9CA3AF; }
.mtg-info { flex: 1; }
.mtg-company { font-weight: 700; font-size: 14px; }
.mtg-note    { font-size: 12px; color: var(--gray); margin-top: 2px; }
.mtg-val     { font-size: 13px; font-weight: 600; color: var(--gray); font-family: 'SF Mono','Fira Code',monospace; }

/* ─── All Deals filter buttons ───────────────────────────────────────────────── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.f-btn {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: #fff; border: 1px solid var(--gray-border); color: var(--gray);
  cursor: pointer; transition: all .15s;
}
.f-btn:hover  { color: var(--red); border-color: var(--red); }
.f-btn.active { color: var(--red); border-color: var(--red); background: #FFF5F5; }
.all-deals-scroll { max-height: calc(100vh - 280px); overflow-y: auto; }
.all-deals-scroll::-webkit-scrollbar { width: 4px; }
.all-deals-scroll::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 2px; }

/* ─── Loading / Error ────────────────────────────────────────────────────────── */
.loading-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 340px; gap: 14px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--gray-border);
  border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--gray); font-weight: 500; }
.error-box { background: #FEE2E2; border: 1px solid #FECACA; border-radius: 10px; padding: 18px 22px; color: #991B1B; font-size: 13px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 13px; }
.spacer { height: 20px; }
.a2p-cell { max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: var(--gray); }
.dash { color: #D1D5DB; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="parasol-logo"></div>
    <div class="header-titles">
      <h1>MessageDesk Dashboard</h1>
      <div class="subtitle">Parasol &middot; <span id="hdr-total">—</span> records &middot; <span id="hdr-date">—</span></div>
    </div>
    <div class="header-pills">
      <span class="pill"><b id="hdr-deals">—</b> Deals</span>
      <span class="pill"><b id="hdr-won">—</b> Closed Won</span>
      <span class="pill">$<b id="hdr-mrr">—</b>/mo Won</span>
    </div>
    <div class="header-right">
      <span class="updated-time" id="updated-time">Updated —</span>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">↻ Refresh</button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════ TABS NAV -->
<nav class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab(0)">🔴 Active Pipeline</button>
    <button class="tab-btn"        onclick="switchTab(1)">📊 Funnel Overview</button>
    <button class="tab-btn"        onclick="switchTab(2)">📅 Meetings Next Week</button>
    <button class="tab-btn"        onclick="switchTab(3)">📈 WoW Changes</button>
    <button class="tab-btn"        onclick="switchTab(4)">🔍 2K+ Pipeline Review</button>
    <button class="tab-btn"        onclick="switchTab(5)">📋 All Deals</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════ PANELS -->

<!-- Tab 0 — Active Pipeline -->
<div class="tab-panel active" id="panel-0">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading Close.io data…</div>
  </div>
</div>

<!-- Tab 1 — Funnel Overview -->
<div class="tab-panel" id="panel-1">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading…</div>
  </div>
</div>

<!-- Tab 2 — Meetings Next Week -->
<div class="tab-panel" id="panel-2">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading meetings…</div>
  </div>
</div>

<!-- Tab 3 — WoW Changes -->
<div class="tab-panel" id="panel-3">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading…</div>
  </div>
</div>

<!-- Tab 4 — Pipeline Review -->
<div class="tab-panel" id="panel-4">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading…</div>
  </div>
</div>

<!-- Tab 5 — All Deals -->
<div class="tab-panel" id="panel-5">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Loading…</div>
  </div>
</div>

<script>
'use strict';
// ─── Global state ──────────────────────────────────────────────────────────────
let dashData   = null;
let activeTab  = 0;
let dealsFilter = 'all';

// ─── Utilities ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtMRR = v => v >= 1000 ? `$${(v/1000).toFixed(1)}K` : `$${Math.round(v)}`;
const fmtFull = v => '$' + Math.round(v).toLocaleString();
const fmtDate = s => { const d = new Date(); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const today   = () => new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

// ─── Tab switching ──────────────────────────────────────────────────────────────
function switchTab(i) {
  activeTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,idx)   => b.classList.toggle('active', idx === i));
  document.querySelectorAll('.tab-panel').forEach((p,idx) => p.classList.toggle('active', idx === i));
  if (!dashData) return;
  if (i === 0) renderPipeline();
  if (i === 1) renderFunnel();
  if (i === 2) renderMeetings();
  if (i === 3) renderWoW();
  if (i === 4) renderPipelineReview();
  if (i === 5) renderAllDeals();
}

// ─── Fetch & render ─────────────────────────────────────────────────────────────
async function fetchAndRender(force = false) {
  const btn = $('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Loading…'; }
  try {
    const url = force ? '/api/dashboard?refresh=1' : '/api/dashboard';
    const res = await fetch(url);
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || `HTTP ${res.status}`); }
    dashData = await res.json();

    updateHeader();
    if (activeTab === 0) renderPipeline();
    if (activeTab === 1) renderFunnel();
    if (activeTab === 2) renderMeetings();
    if (activeTab === 3) renderWoW();
    if (activeTab === 4) renderPipelineReview();
    if (activeTab === 5) renderAllDeals();
    const ts = new Date(dashData.updated_at);
    const hh = String(ts.getHours()).padStart(2,'0');
    const mm = String(ts.getMinutes()).padStart(2,'0');
    const ss = String(ts.getSeconds()).padStart(2,'0');
    const upd = $('updated-time');
    if (upd) upd.textContent = `Updated ${hh}:${mm}:${ss}${dashData.cached ? ' (cached)' : ''}`;
  } catch(e) {
    for (let i = 0; i < 6; i++) { const p = $(`panel-${i}`); if (p) p.innerHTML = `<div class="error-box">⚠ Failed to load: ${e.message}</div>`; }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh'; }
  }
}

function refreshData() { fetchAndRender(true); }

// ─── Header update ──────────────────────────────────────────────────────────────
function updateHeader() {
  const k = dashData.kpis;
  const hTotal = $('hdr-total'); if (hTotal) hTotal.textContent = k.total;
  const hDate  = $('hdr-date');  if (hDate)  hDate.textContent  = today();
  const hDeals = $('hdr-deals'); if (hDeals) hDeals.textContent = k.total;
  const hWon   = $('hdr-won');   if (hWon)   hWon.textContent   = k.won_count;
  const hMRR   = $('hdr-mrr');   if (hMRR)   hMRR.textContent   = Math.round(k.won_mrr).toLocaleString();
}

// ─── Badge helpers ──────────────────────────────────────────────────────────────
function ageBadge(days) {
  if (days === null || days === undefined) return '<span class="dash">—</span>';
  const cls = days <= 14 ? 'ag-green' : days <= 30 ? 'ag-yellow' : 'ag-red';
  return `<span class="age ${cls}">${days}d</span>`;
}

function scoreVal(d) {
  let s = 50;
  if (d.stage === 'Champion Confirmed') s += 20;
  else if (d.stage === 'Active Evaluation') s += 10;
  if (d.demo_completed) s += 15;
  const a2p = d.a2p_status || '';
  if (a2p.startsWith('5.')) s += 10;
  else if (a2p.startsWith('4.')) s += 5;
  if (d.monthly_value >= 200) s += 10;
  else if (d.monthly_value >= 100) s += 5;
  return Math.min(s, 99);
}

function scClass(x) {
  return x >= 80 ? 'sc-green' : x >= 65 ? 'sc-yellow' : 'sc-red';
}

function scoreBadge(d) {
  const x = d.score !== undefined ? d.score : scoreVal(d);
  return `<span class="score ${scClass(x)}">${x}</span>`;
}

function stageBadge(cat, stage) {
  const map = {
    active:     stage === 'Champion Confirmed' ? 'sb-champion' : 'sb-active',
    onboarding: 'sb-onboarding',
    won:        'sb-won',
    lost:       'sb-lost',
  };
  const cls = map[cat] || 'sb-active';
  return `<span class="sb ${cls}">${stage}</span>`;
}

function a2pShort(s) {
  if (!s) return '<span class="dash">—</span>';
  // "3. Registration Submitted" → "3. Reg. Submitted"
  return `<span class="a2p-cell" title="${s}">${s.slice(0,22)}${s.length>22?'…':''}</span>`;
}

// ─── CSS horizontal bar chart ───────────────────────────────────────────────────
function bars(containerId, rows, opts = {}) {
  // rows: [{label, count, mrr, color}]
  const max = Math.max(...rows.map(r => r.count), 1);
  const el  = $(containerId);
  if (!el) return;
  el.innerHTML = rows.map(r => {
    const pct   = Math.round((r.count / max) * 100);
    const sub   = opts.showMRR && r.mrr ? ` · ${fmtMRR(r.mrr)}/mo` : '';
    return `<div class="hbar-row">
      <div class="hbar-meta">
        <span class="hbar-lbl">${r.label}</span>
        <span class="hbar-cnt">${r.count}${sub}</span>
      </div>
      <div class="hbar-track">
        <div class="hbar-fill" style="width:${pct}%;background:${r.color}"></div>
      </div>
    </div>`;
  }).join('');
}

// ─── Canvas donut chart ─────────────────────────────────────────────────────────
function drawDonut(canvasId, segments) {
  // segments: [{label, value, color}]
  const canvas = $(canvasId);
  if (!canvas) return;
  const size = 160;
  canvas.width  = size;
  canvas.height = size;
  const ctx   = canvas.getContext('2d');
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  if (total === 0) { ctx.fillStyle = '#E5E7EB'; ctx.beginPath(); ctx.arc(size/2,size/2,size/2-10,0,Math.PI*2); ctx.fill(); return; }

  let angle = -Math.PI / 2;
  for (const seg of segments) {
    const slice = (seg.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(size/2, size/2);
    ctx.arc(size/2, size/2, size/2 - 6, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    angle += slice;
  }
  // hollow center
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2 - 36, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  // center label
  ctx.fillStyle = '#111';
  ctx.font = 'bold 13px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(fmtMRR(total), size/2, size/2);
}

// ─── Canvas monthly bar + cumulative line chart ────────────────────────────────
function drawCreatedChart(canvasId, newByMonth) {
  const canvas = $(canvasId);
  if (!canvas) return;

  // Build sorted month list from Sep 2025 to current month
  const now     = new Date();
  const curKey  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const start   = new Date(2025, 8, 1); // Sep 2025
  const months  = [];
  const d       = new Date(start);
  while (d <= now) {
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    d.setMonth(d.getMonth() + 1);
  }

  const vals = months.map(m => newByMonth[m] || 0);
  const maxV = Math.max(...vals, 1);

  // Cumulative
  const cum = []; let acc = 0;
  vals.forEach(v => { acc += v; cum.push(acc); });
  const maxC = acc || 1;

  const W = canvas.offsetWidth || 600;
  const H = 200;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const padL = 10, padR = 10, padT = 16, padB = 32;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW   = Math.max(4, Math.floor(chartW / months.length) - 3);

  const prevKey = months.length >= 2 ? months[months.length - 2] : '';

  // Bars
  months.forEach((m, i) => {
    const x    = padL + i * (chartW / months.length) + (chartW / months.length - barW) / 2;
    const barH = (vals[i] / maxV) * chartH;
    const y    = padT + chartH - barH;
    ctx.fillStyle = m === curKey ? '#E8231A' : m === prevKey ? '#9CA3AF' : '#D1D5DB';
    ctx.fillRect(x, y, barW, barH);
  });

  // Cumulative line
  ctx.beginPath();
  ctx.strokeStyle = '#1B9BF0';
  ctx.lineWidth   = 2;
  ctx.setLineDash([4, 3]);
  months.forEach((m, i) => {
    const cx = padL + i * (chartW / months.length) + (chartW / months.length) / 2;
    const cy = padT + chartH - (cum[i] / maxC) * chartH;
    i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // X-axis labels (every 2nd month)
  ctx.fillStyle   = '#9CA3AF';
  ctx.font        = '10px Inter, sans-serif';
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'top';
  months.forEach((m, i) => {
    if (i % 2 !== 0) return;
    const cx  = padL + i * (chartW / months.length) + (chartW / months.length) / 2;
    const lbl = m.slice(5); // "MM"
    const mo  = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(lbl)];
    ctx.fillText(mo, cx, padT + chartH + 6);
  });

  // Legend
  ctx.textAlign = 'left';
  ctx.fillStyle = '#E8231A';
  ctx.fillRect(padL, 2, 10, 10);
  ctx.fillStyle = '#374151'; ctx.font = '10px Inter,sans-serif';
  ctx.fillText('New deals/month', padL + 13, 2);
  ctx.strokeStyle = '#1B9BF0'; ctx.lineWidth = 2; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(padL + 140, 7); ctx.lineTo(padL + 152, 7); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#374151';
  ctx.fillText('Cumulative', padL + 155, 2);
}

// ─── renderMeetings — Tab 2 ─────────────────────────────────────────────────────
async function renderMeetings() {
  $('panel-2').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading meetings…</div></div>`;
  let data;
  try {
    const res = await fetch('/api/meetings');
    data = await res.json();
  } catch(e) {
    $('panel-2').innerHTML = `<div class="error-box">⚠ Could not load meetings: ${e.message}</div>`; return;
  }

  const meetings   = data.meetings || [];
  const weekStart  = data.week_start || '';
  const weekEnd    = data.week_end   || '';
  const fmtRange   = (s, e) => {
    const opts = { month:'short', day:'numeric' };
    const sd   = s ? new Date(s + 'T12:00:00') : null;
    const ed   = e ? new Date(e + 'T12:00:00') : null;
    if (!sd || !ed) return '';
    return `${sd.toLocaleDateString('en-US',opts)} – ${ed.toLocaleDateString('en-US',opts)}`;
  };
  const range = fmtRange(weekStart, weekEnd);

  // Group by day
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const byDay = {};
  meetings.forEach(m => {
    const dt  = new Date((m.due_date || m.date || weekStart) + 'T12:00:00');
    const key = dt.toISOString().split('T')[0];
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push({ ...m, _dt: dt });
  });

  // Pipeline at stake — try to match meeting lead_id to dashboard deals
  const dealByLead = {};
  (dashData?.deals || []).forEach(d => { if (d.lead_id) dealByLead[d.lead_id] = d; });
  const pipelineSum = meetings.reduce((s, m) => {
    const d = dealByLead[m.lead_id];
    return s + (d ? d.monthly_value : 0);
  }, 0);

  // Busiest day
  let busiestDay = '', busiestCount = 0;
  Object.entries(byDay).forEach(([k, arr]) => {
    if (arr.length > busiestCount) { busiestCount = arr.length; busiestDay = k; }
  });
  const bDayLabel = busiestDay ? new Date(busiestDay+'T12:00:00').toLocaleDateString('en-US',{weekday:'long'}) : '—';

  const dayHTML = Object.keys(byDay).sort().map(key => {
    const arr    = byDay[key];
    const dt     = new Date(key + 'T12:00:00');
    const dayLbl = `${DAYS[dt.getDay()].toUpperCase()}, ${MONS[dt.getMonth()].toUpperCase()} ${dt.getDate()}, ${dt.getFullYear()} — ${arr.length} meeting${arr.length!==1?'s':''}`;
    const cards  = arr.map(m => {
      const deal = dealByLead[m.lead_id];
      const val  = deal ? fmtFull(deal.monthly_value) + '/mo' : '—';
      const note = m.note || (deal ? 'Deal in pipeline' : 'New lead — first meeting');
      return `<div class="meeting-card">
        <div class="mtg-date-box">
          <div class="mtg-day">${dt.getDate()}</div>
          <div class="mtg-mon">${MONS[dt.getMonth()]}</div>
        </div>
        <div class="mtg-info">
          <div class="mtg-company">${m.lead_name || m.contact_name || 'Unknown'}</div>
          <div class="mtg-note">${note}</div>
        </div>
        <div class="mtg-val">${val}</div>
      </div>`;
    }).join('');
    return `<div class="day-group"><div class="day-label">${dayLbl}</div>${cards}</div>`;
  }).join('');

  $('panel-2').innerHTML = `
    <div class="alert-bar">
      <div class="blink-dot"></div>
      <div><strong>${meetings.length}</strong> meetings scheduled
        &nbsp;·&nbsp; ${range}
        &nbsp;·&nbsp; <strong>${busiestCount}</strong> on ${bDayLabel}
        &nbsp;·&nbsp; Combined pipeline: <strong>${fmtMRR(pipelineSum)}/mo</strong>
      </div>
    </div>
    <div class="kpi-grid cols3" style="margin-bottom:24px">
      <div class="kpi-card blue">
        <div class="kpi-label">Total Meetings</div>
        <div class="kpi-value">${meetings.length}</div>
        <div class="kpi-sub">${range}</div>
      </div>
      <div class="kpi-card yellow">
        <div class="kpi-label">Busiest Day</div>
        <div class="kpi-value">${busiestCount}</div>
        <div class="kpi-sub">${bDayLabel}</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Pipeline at Stake</div>
        <div class="kpi-value">${fmtMRR(pipelineSum)}</div>
        <div class="kpi-sub">monthly recurring</div>
      </div>
    </div>
    ${meetings.length ? dayHTML : '<div class="empty-state">No meetings scheduled for next week.</div>'}
  `;
}

function renderWoW() {

  const newThis  = ch.new_this_week        || [];

  const wonLast  = ch.won_last_week        || [];

  const lostLast = ch.lost_last_week       || [];
  const onbThis  = ch.onboarding_this_week || [];
  const chmpThis = ch.champion_this_week   || [];
  const actUpd   = ch.active_updated       || [];

  const delta = (curr, prev) => {
    const d = curr - prev;
    if (d === 0) return '<span class="delta neu">0</span>';
    const cls = d > 0 ? 'pos' : 'neg';
    return `<span class="delta ${cls}">${d > 0 ? '+' : ''}${d}</span>`;
  };

  const movements = [
    { label: 'New Added',      count: newThis.length,  color: '#00695C' },
    { label: '→ Closed Won',   count: wonThis.length,  color: '#16A34A' },
    { label: '→ Closed Lost',  count: lostThis.length, color: '#E8231A' },
    { label: '→ Onboarding',   count: onbThis.length,  color: '#7C3AED' },
    { label: '→ Champion',     count: chmpThis.length, color: '#F5C800' },
    { label: 'Active Updated', count: actUpd.length,   color: '#1B9BF0' },
  ];
  const maxMov = Math.max(...movements.map(m => m.count), 1);

  const movRows = movements.map(m => `
    <div class="movement-row">
      <div style="width:130px;font-size:12px;font-weight:500">${m.label}</div>
      <div style="flex:1;background:var(--gray-light);border-radius:4px;height:10px;overflow:hidden">
        <div style="height:100%;width:${Math.round(m.count/maxMov*100)}%;background:${m.color};border-radius:4px"></div>
      </div>
      <div style="width:28px;text-align:right;font-size:12px;font-weight:700;color:var(--gray)">${m.count}</div>
    </div>`).join('');

  const wonRows = wonThis.slice(0,20).map(d => `<tr>
    <td class="col-company">${d.company}</td>
    <td class="mono">${d.monthly_value > 0 ? fmtFull(d.monthly_value)+'/mo' : '—'}</td>
    <td style="font-size:11px;color:var(--gray)">${d.date_updated ? d.date_updated.slice(0,10) : '—'}</td>
  </tr>`).join('') || `<tr><td colspan="3" class="empty-state">No closed won deals in last 7 days</td></tr>`;

  const newRows = newThis.sort((a,b) => b.monthly_value - a.monthly_value).slice(0,20).map(d => `<tr>
    <td class="col-company">${d.company}</td>
    <td class="mono">${d.monthly_value > 0 ? fmtFull(d.monthly_value)+'/mo' : '—'}</td>
    <td>${stageBadge(d.category, d.stage)}</td>
  </tr>`).join('') || `<tr><td colspan="3" class="empty-state">No new deals added in last 7 days</td></tr>`;

  $('panel-3').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">New Added This Week</div>
        <div class="kpi-value">${newThis.length} ${delta(newThis.length, newLast.length)}</div>
        <div class="kpi-prev">${newLast.length} added last week</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Closed Won This Week</div>
        <div class="kpi-value">${wonThis.length} ${delta(wonThis.length, wonLast.length)}</div>
        <div class="kpi-prev">${wonLast.length} closed won last week</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Closed Lost This Week</div>
        <div class="kpi-value">${lostThis.length} ${delta(lostThis.length, lostLast.length)}</div>
        <div class="kpi-prev">${lostLast.length} closed lost last week</div>
      </div>
      <div class="kpi-card black">
        <div class="kpi-label">→ Champion / Onboarding</div>
        <div class="kpi-value">${chmpThis.length + onbThis.length}</div>
        <div class="kpi-prev">${chmpThis.length} champion · ${onbThis.length} onboarding</div>
      </div>
    </div>

    <div class="g2" style="margin-bottom:20px">
      <div class="chart-card">
        <div class="chart-title">New Deals Created by Month — Sep 2025 → now</div>
        <canvas id="created-chart" class="chart-canvas" style="height:200px"></canvas>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--gray)">
          <span><span style="display:inline-block;width:10px;height:10px;background:#E8231A;border-radius:2px;margin-right:4px"></span>Current month</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#9CA3AF;border-radius:2px;margin-right:4px"></span>Previous month</span>
          <span style="border-bottom:2px dashed #1B9BF0;padding-bottom:1px">Cumulative</span>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Stage Movements — Last 7 Days</div>
        ${movRows}
      </div>
    </div>

    <div class="g2">
      <div class="table-wrap">
        <div class="section-head">
          <span class="section-title">Closed Won — Last 7 Days</span>
          <span class="section-badge">${wonThis.length} deal${wonThis.length!==1?'s':''}</span>
        </div>
        <div class="tscroll">
          <table>
            <thead><tr><th>Company</th><th>Value</th><th>Date</th></tr></thead>
            <tbody>${wonRows}</tbody>
          </table>
        </div>
      </div>
      <div class="table-wrap">
        <div class="section-head">
          <span class="section-title">New Deals Added — Last 7 Days</span>
          <span class="section-badge">${newThis.length} deal${newThis.length!==1?'s':''}</span>
        </div>
        <div class="tscroll">
          <table>
            <thead><tr><th>Company</th><th>Value</th><th>Stage</th></tr></thead>
            <tbody>${newRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  requestAnimationFrame(() => drawCreatedChart('created-chart', nb));
}

// ─── renderPipelineReview — Tab 4 ───────────────────────────────────────────────
function renderPipelineReview() {
  $('panel-4').innerHTML = `
    <div class="empty-state" style="padding:60px 20px">
      <div style="font-size:32px;margin-bottom:16px">🔍</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Pipeline Review Unavailable</div>
      <div style="color:var(--gray);font-size:13px;max-width:420px;margin:0 auto;line-height:1.6">
        Pipeline Review and A2P Status notes require fetching full lead records from Close.io.
        That fetch (~19,000 leads) exceeds the serverless time limit, so this tab is disabled.
        <br><br>
        Use Close.io directly to review pipeline notes.
      </div>
    </div>
  `;
}

// ─── renderAllDeals — Tab 5 ─────────────────────────────────────────────────────
let _dealsFilter = 'all';

function filterDeals(f, btn) {
  _dealsFilter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAllDeals();
}

function renderAllDeals() {
  const all    = dashData.deals;
  const k      = dashData.kpis;
  const active = all.filter(d => d.category === 'active');
  const onbd   = all.filter(d => d.category === 'onboarding');
  const won    = all.filter(d => d.category === 'won');
  const lost   = all.filter(d => d.category === 'lost');
  const demo   = all.filter(d => d.demo_completed);

  const filtered = _dealsFilter === 'all'        ? all
                 : _dealsFilter === 'active'      ? active
                 : _dealsFilter === 'onboarding'  ? onbd
                 : _dealsFilter === 'won'         ? won
                 : _dealsFilter === 'lost'        ? lost
                 : _dealsFilter === 'demo'        ? demo
                 : all;

  const rows = [...filtered]
    .sort((a,b) => b.monthly_value - a.monthly_value)
    .map(d => {
      const demo = d.demo_completed
        ? '<span style="color:var(--green);font-weight:700;font-size:12px">✓ done</span>'
        : '<span class="dash">—</span>';
      return `<tr>
        <td class="col-company">${d.company}</td>
        <td>${stageBadge('active', d.category === 'active' ? 'Active' : d.category === 'onboarding' ? 'Onboarding' : d.category === 'won' ? 'Won' : 'Lost')} <span class="sb ${d.category==='active'?'sb-active':d.category==='onboarding'?'sb-onboarding':d.category==='won'?'sb-won':'sb-lost'}" style="display:none"></span></td>
        <td style="font-size:12px;color:var(--gray)">${d.stage}</td>
        <td class="mono">${d.monthly_value > 0 ? fmtFull(d.monthly_value)+'/mo' : '—'}</td>
        <td class="a2p-cell" title="${d.a2p_status||''}">${d.a2p_status ? d.a2p_status.slice(0,24)+(d.a2p_status.length>24?'…':'') : '<span class="dash">—</span>'}</td>
        <td>${demo}</td>
      </tr>`;
    }).join('');

  const catBadge = cat => {
    const map = {active:'sb-active',onboarding:'sb-onboarding',won:'sb-won',lost:'sb-lost'};
    return map[cat] || 'sb-active';
  };

  // Better row rendering
  const betterRows = [...filtered]
    .sort((a,b) => b.monthly_value - a.monthly_value)
    .map(d => {
      const demo = d.demo_completed
        ? '<span style="color:var(--green);font-weight:700;font-size:12px">✓ done</span>'
        : '<span class="dash">—</span>';
      const catLabel = d.category === 'active' ? 'Active' : d.category === 'onboarding' ? 'Onboarding' : d.category === 'won' ? 'Won' : 'Lost';
      return `<tr>
        <td class="col-company">${d.company}</td>
        <td><span class="sb ${catBadge(d.category)}">${catLabel}</span></td>
        <td style="font-size:12px;color:var(--gray)">${d.stage}</td>
        <td class="mono">${d.monthly_value > 0 ? fmtFull(d.monthly_value)+'/mo' : '<span class="dash">—</span>'}</td>
        <td class="a2p-cell" title="${d.a2p_status||''}">${d.a2p_status ? d.a2p_status.slice(0,22)+(d.a2p_status.length>22?'…':'') : '<span class="dash">—</span>'}</td>
        <td>${demo}</td>
      </tr>`;
    }).join('') || `<tr><td colspan="6" class="empty-state">No deals match this filter</td></tr>`;

  $('panel-5').innerHTML = `
    <div class="filter-bar">
      <button class="f-btn ${_dealsFilter==='all'?'active':''}"        onclick="filterDeals('all',this)">All (${all.length})</button>
      <button class="f-btn ${_dealsFilter==='active'?'active':''}"     onclick="filterDeals('active',this)">Active (${active.length})</button>
      <button class="f-btn ${_dealsFilter==='onboarding'?'active':''}" onclick="filterDeals('onboarding',this)">Onboarding (${onbd.length})</button>
      <button class="f-btn ${_dealsFilter==='won'?'active':''}"        onclick="filterDeals('won',this)">Won (${won.length})</button>
      <button class="f-btn ${_dealsFilter==='lost'?'active':''}"       onclick="filterDeals('lost',this)">Lost (${lost.length})</button>
      <button class="f-btn ${_dealsFilter==='demo'?'active':''}"       onclick="filterDeals('demo',this)">Demo Done (${demo.length})</button>
    </div>
    <div class="table-wrap">
      <div class="all-deals-scroll">
        <table>
          <thead><tr>
            <th>Company</th><th>Stage</th><th>Substage</th>
            <th>Value</th><th>A2P</th><th>Demo</th>
          </tr></thead>
          <tbody>${betterRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ─── Auto-refresh every 5 minutes ──────────────────────────────────────────────
setInterval(() => fetchAndRender(false), 5 * 60 * 1000);

// ─── Init ───────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => fetchAndRender(false));
</script>
</body>
