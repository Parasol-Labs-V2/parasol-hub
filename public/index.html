<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parasol Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #111; }
.hub-header {
  background: #111111;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 24px;
  border-bottom: 3px solid #E8231A;
}
.hub-logo { font-size: 1.4rem; font-weight: 700; color: white; }
.hub-logo span { color: #E8231A; }
.hub-subtitle { color: #666; font-size: 0.8rem; margin-right: auto; }
.client-btns { display: flex; gap: 8px; }
.client-btn {
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid white;
  background: transparent;
  color: white;
  transition: all 0.15s;
}
.client-btn.active { background: #E8231A; border-color: #E8231A; }
.client-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
.frame { display: none; width: 100%; height: calc(100vh - 59px); border: none; }
.frame.active { display: block; }
</style>
</head>
<body>
<header class="hub-header">
  <div class="hub-logo"><span>Parasol</span> Hub</div>
  <div class="hub-subtitle">Client Dashboard Portal</div>
  <div class="client-btns">
    <button class="client-btn active" onclick="switchClient('messagedesk', this)">MessageDesk</button>
    <button class="client-btn" onclick="switchClient('duet', this)">Duet</button>
  </div>
</header>

<iframe id="frame-messagedesk" class="frame active" src="https://messagedesk-dashboard.vercel.app/"></iframe>
<iframe id="frame-duet" class="frame" src="https://duet-dashboard.vercel.app/"></iframe>

<script>
function switchClient(client, btn) {
  document.querySelectorAll('.client-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('frame-' + client).classList.add('active');
}
</script>
</body>
</html>
